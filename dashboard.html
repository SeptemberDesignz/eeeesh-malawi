<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Eeeesh — Anonymous Inbox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="user-welcome">
                <div>
                    <h2>Welcome, <span id="userName">...</span></h2>
                    <div class="user-email">
                        <i class="fas fa-envelope"></i> <span id="userEmail"></span>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div id="notificationBanner" style="background: #f0f0f0; border-radius: 16px; padding: 12px; margin-bottom: 16px; text-align: center; display: none;">
                <i class="fas fa-bell"></i> <strong>Enable notifications</strong> to know when you get new anonymous questions!
                <button onclick="requestNotificationPermission()" style="background: #ff3b30; color: white; border: none; padding: 6px 16px; border-radius: 100px; margin-left: 12px; cursor: pointer;">
                    <i class="fas fa-bell"></i> Enable
                </button>
            </div>
            
            <div class="link-card">
                <div class="card-header">
                    <i class="fas fa-link"></i>
                    <strong>Your anonymous link</strong>
                </div>
                <div class="link-code" id="anonymousLink">
                    <i class="fas fa-spinner fa-pulse"></i> Loading...
                </div>
                <div class="button-group">
                    <button onclick="copyLink()" class="apple-btn red small">
                        <i class="fas fa-copy"></i> Copy link
                    </button>
                    <button onclick="shareToWhatsApp()" class="whatsapp-btn">
                        <i class="fab fa-whatsapp"></i> Share to WhatsApp
                    </button>
                    <button onclick="shareAsImage()" class="share-image-btn">
                        <i class="fas fa-image"></i> Share as Image
                    </button>
                </div>
                <p class="hint-text">
                    <i class="fas fa-shield-alt"></i> Share this link on WhatsApp, Facebook, or SMS — nobody will know it's you!
                </p>
            </div>
        </div>
        
        <div class="inbox-header">
            <h3><i class="fas fa-inbox"></i> Anonymous questions</h3>
            <span class="badge" id="questionCount">0</span>
        </div>
        <div id="questionsList">
            <div class="loading">
                <i class="fas fa-spinner fa-pulse"></i> Loading your inbox...
            </div>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
