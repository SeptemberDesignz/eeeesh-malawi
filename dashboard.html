<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Eeeesh — Anonymous Inbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="user-welcome">
                <div>
                    <h2>Welcome, <span id="userName">...</span> 🇲🇼</h2>
                    <div class="user-email" id="userEmail"></div>
                </div>
                <button onclick="logout()" style="background: none; color: #ff3b30; border: none; font-size: 15px; cursor: pointer;">🚪 Logout</button>
            </div>
            
            <div class="link-card">
                <strong>🔗 Your anonymous link</strong>
                <div class="link-code" id="anonymousLink">Loading...</div>
                <button onclick="copyLink(document.getElementById('anonymousLink').innerText)" class="apple-btn red" style="margin-bottom: 12px;">📋 Copy link</button>
                <button onclick="shareToWhatsApp(document.getElementById('anonymousLink').innerText, document.getElementById('userName').innerText)" class="whatsapp-btn">
                    💚 Share to WhatsApp Status
                </button>
                <p style="font-size: 12px; color: #8e8e93; margin-top: 12px;">
                    Share this link on WhatsApp, Facebook, or SMS — nobody will know it's you!
                </p>
            </div>
        </div>
        
        <h3 style="margin-bottom: 16px; font-weight: 600;">📬 Anonymous questions for you</h3>
        <div id="questionsList">
            <div class="loading">Loading your inbox...</div>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
