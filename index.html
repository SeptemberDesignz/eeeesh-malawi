<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eeeesh Malawi — Ask Anonymously</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="glass-card">
            <div class="logo">
                <i class="fas fa-comment-dots"></i>
                <h1>Eeeesh<span>Malawi</span></h1>
            </div>
            <p class="subtitle">Ask anything. Stay anonymous. No judgment.</p>
            
            <!-- Only Google Sign-In Button -->
            <button onclick="handleGoogleSignIn()" class="apple-btn google" style="margin-top: 20px;">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            
            <p class="terms-text" style="margin-top: 32px;">
                By continuing, you agree to our <a href="terms.html"><i class="fas fa-file-contract"></i> Terms & Conditions</a>
            </p>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
