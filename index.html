<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eeeesh Malawi — Ask Anonymously</title>
    <link rel="stylesheet" href="style.css">
    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="hero">
        <div class="glass-card">
            <div class="logo">
                <span class="logo-icon">🇲🇼</span>
                <h1>Eeeesh<span>Malawi</span></h1>
            </div>
            <p class="subtitle">Ask anything. Stay anonymous. No judgment.</p>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Log in</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign up</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginTab" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" class="apple-input">
                <input type="password" id="loginPassword" placeholder="Password" class="apple-input">
                <button onclick="handleLogin()" class="apple-btn red">Log in →</button>
                <div class="divider">or</div>
                <button onclick="handleGoogleSignIn()" class="apple-btn google">
                    <span>🍎</span> Continue with Google
                </button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupTab" class="auth-form">
                <input type="text" id="signupName" placeholder="Display name" class="apple-input">
                <input type="email" id="signupEmail" placeholder="Email" class="apple-input">
                <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" class="apple-input">
                <div id="recaptcha-container" class="recaptcha-box"></div>
                <button onclick="handleSignup()" class="apple-btn red">Create account →</button>
                <div class="divider">or</div>
                <button onclick="handleGoogleSignIn()" class="apple-btn google">
                    <span>🍎</span> Sign up with Google
                </button>
            </div>
            
            <p class="terms-text">
                By continuing, you agree to our <a href="terms.html">Terms & Conditions</a>
            </p>
        </div>
    </div>
    
    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
