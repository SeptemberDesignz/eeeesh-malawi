<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask anonymously • Eeeesh Malawi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Eeeesh Malawi <span>anonymous</span></h1>
        </div>
        
        <div class="content">
            <div id="recipientInfo" style="text-align:center; margin-bottom:20px;">
                <h2>Ask <span id="recipientName">someone</span> anonymously</h2>
                <p>Your question is 100% anonymous — no name, no email, no tracking.</p>
            </div>

            <div class="input-group">
                <label>💬 Your anonymous question:</label>
                <textarea id="anonymousQuestion" rows="4" placeholder="e.g., 'Banda, why did you really leave that job?' or 'What's the tea on Area 49?'"></textarea>
            </div>
            
            <button onclick="sendAnonymousQuestion()">Send anonymously →</button>
            <div id="messageStatus" style="margin-top:1rem; text-align:center;"></div>
            
            <hr>
            <p style="text-align:center; font-size:13px; color:#7f6e4a;">
                ⚡ Nobody will ever know who asked. True anonymity.<br>
                <a href="index.html">← Back to Eeeesh Malawi</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
