<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask anonymously • Eeeesh Malawi</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="glass-card">
            <div class="logo">
                <i class="fas fa-user-secret"></i>
                <h1>Ask <span>anonymously</span></h1>
            </div>
            <p class="subtitle">
                <i class="fas fa-question-circle"></i> Ask <strong id="recipientName">...</strong> anything — they'll never know it's you.
            </p>
            
            <div class="question-input-wrapper">
                <i class="fas fa-pen-fancy"></i>
                <textarea id="anonymousQuestion" rows="5" placeholder="Type your anonymous question here... (e.g., 'Why did you really leave that job?' or 'What's the tea?')" class="apple-input"></textarea>
            </div>
            
            <button onclick="sendAnonymousQuestion()" class="apple-btn red">
                <i class="fas fa-paper-plane"></i> Send anonymously
            </button>
            <div id="messageStatus" class="status-message"></div>
            
            <hr>
            
            <div class="privacy-box">
                <i class="fas fa-shield-alt"></i>
                <div>
                    <strong>100% anonymous</strong><br>
                    No names, no emails, no tracking. Your identity is completely safe.
                </div>
            </div>
            
            <p class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Eeeesh Malawi</a>
            </p>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
