<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask anonymously • Eeeesh Malawi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="glass-card">
            <div class="logo">
                <span class="logo-icon">🤫</span>
                <h1>Ask <span>anonymously</span></h1>
            </div>
            <p style="text-align: center; margin-bottom: 20px;">
                Ask <strong id="recipientName" style="color: #ff3b30;">...</strong> anything — they'll never know it's you.
            </p>
            
            <textarea id="anonymousQuestion" rows="5" placeholder="Type your anonymous question here... (e.g., 'Why did you really leave that job?' or 'What's the tea?')" class="apple-input" style="margin: 10px 0;"></textarea>
            <button onclick="sendAnonymousQuestion()" class="apple-btn red">Send anonymously →</button>
            <div id="messageStatus" style="text-align: center; margin-top: 16px;"></div>
            
            <hr style="margin: 24px 0; border-color: #e5e5ea;">
            
            <div style="background: #f9f9fb; padding: 16px; border-radius: 20px;">
                <p style="font-size: 13px; color: #8e8e93; text-align: center; margin: 0;">
                    🔒 <strong>100% anonymous</strong><br>
                    No names, no emails, no tracking. Your identity is completely safe.
                </p>
            </div>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: #ff3b30; text-decoration: none;">← Back to Eeeesh Malawi</a>
            </p>
        </div>
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
